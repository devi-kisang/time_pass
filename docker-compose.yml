services:
  backend:
    image: ghcr.io/devi-kisang/time_pass-backend:latest
    container_name: time-pass-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - /var/www/videos:/var/www/videos
  frontend:
    image: ghcr.io/devi-kisang/time_pass-frontend:latest
    container_name: time-pass-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
  prometheus:
    image: prom/prometheus
    container_name: time-pass-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
  grafana:
    image: grafana/grafana
    container_name: time-pass-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SERVER_DOMAIN=kisang.tech
      - GF_SERVER_ROOT_URL=https://kisang.tech/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana-data:/var/lib/grafana
volumes:
  grafana-data:
