name: CI & Docker Publish

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build & push backend image
      run: |
        docker build -t ghcr.io/devi-kisang/time_pass-backend:latest ./backend
        docker push ghcr.io/devi-kisang/time_pass-backend:latest

    - name: Build & push frontend image
      run: |
        docker build -t ghcr.io/devi-kisang/time_pass-frontend:latest ./frontend
        docker push ghcr.io/devi-kisang/time_pass-frontend:latest

    - name: Deploy to Azure VM
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd ~
          echo "🔽 Pulling latest images..."
          docker compose pull

          echo "🚀 Restarting services..."
          docker compose up -d --remove-orphans --force-recreate

          echo "🧹 Cleaning up old images..."
          docker image prune -f

          echo "✅ Deploy complete!"
